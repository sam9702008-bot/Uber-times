<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uber 時薪計算器</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 20px;
    background: #f5f6f8;
    color: #17181a;
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "PingFang TC",
        "Noto Sans TC",
        sans-serif;
}

.container {
    max-width: 680px;
    margin: auto;
}

h1 {
    font-size: 28px;
    margin: 8px 0 4px;
}

.subtitle {
    color: #74777c;
    margin-bottom: 18px;
}

.card {
    background: white;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.05);
}

label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 7px;
}

input {
    width: 100%;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 12px;
    font-size: 17px;
    background: white;
}

.rate-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.rate-row input {
    flex: 1;
}

.time-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

button {
    border: 0;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
}

.primary {
    background: #111;
    color: white;
    width: 100%;
    margin-top: 14px;
}

.secondary {
    background: #eef0f2;
    color: #111;
}

.danger {
    background: #fff0ef;
    color: #d92d20;
    padding: 8px 11px;
}

.timer {
    text-align: center;
}

.timer-display {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 1px;
    margin: 8px 0 14px;
    font-variant-numeric: tabular-nums;
}

.timer-actions {
    display: flex;
    gap: 10px;
}

.timer-actions button {
    flex: 1;
}

.summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.stat {
    background: #f7f7f8;
    border-radius: 14px;
    padding: 14px;
}

.stat small {
    display: block;
    color: #74777c;
    margin-bottom: 5px;
}

.stat strong {
    font-size: 23px;
}

.record {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    border-top: 1px solid #e5e7eb;
    padding: 13px 0;
}

.record:first-child {
    border-top: 0;
}

.record-main {
    min-width: 0;
}

.record-title {
    font-weight: 700;
}

.record-meta {
    color: #74777c;
    font-size: 14px;
    margin-top: 3px;
}

.record-pay {
    font-weight: 800;
    white-space: nowrap;
}

.empty {
    text-align: center;
    color: #74777c;
    padding: 18px 0;
}

.note {
    font-size: 13px;
    color: #74777c;
    line-height: 1.5;
    margin-top: 10px;
}

@media (max-width: 420px) {

    .timer-display {
        font-size: 35px;
    }

    .summary {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>Uber 時薪計算器</h1>

    <div class="subtitle">
        以時薪計算你的最低報酬與工作收入
    </div>


    <!-- 時薪設定 -->
    <div class="card">

        <label>時薪</label>

        <div class="rate-row">

            <input
                id="rate"
                type="number"
                min="0"
                step="0.01"
                value="245"
            >

            <span>元 / 小時</span>

        </div>

    </div>


    <!-- 即時計時 -->
    <div class="card timer">

        <label>即時工作計時</label>

        <div
            id="timerDisplay"
            class="timer-display"
        >
            00:00:00
        </div>

        <div class="timer-actions">

            <button
                id="startBtn"
                class="primary"
                onclick="startTimer()"
            >
                開始工作
            </button>

            <button
                id="stopBtn"
                class="secondary"
                onclick="stopTimer()"
                disabled
            >
                停止並加入
            </button>

        </div>

        <div class="note">
            按「開始工作」後計時，
            停止後會自動把這段時間加入下方紀錄。
        </div>

    </div>


    <!-- 手動新增 -->
    <div class="card">

        <label>手動新增工作時間</label>

        <div class="time-grid">

            <div>

                <label for="hours">
                    小時
                </label>

                <input
                    id="hours"
                    type="number"
                    min="0"
                    step="1"
                    value="0"
                >

            </div>


            <div>

                <label for="minutes">
                    分鐘
                </label>

                <input
                    id="minutes"
                    type="number"
                    min="0"
                    max="59"
                    step="1"
                    value="0"
                >

            </div>


            <div>

                <label for="seconds">
                    秒
                </label>

                <input
                    id="seconds"
                    type="number"
                    min="0"
                    max="59"
                    step="1"
                    value="0"
                >

            </div>

        </div>


        <label style="margin-top:12px">
            日期
        </label>

        <input
            id="date"
            type="date"
        >


        <button
            class="primary"
            onclick="addManual()"
        >
            加入紀錄
        </button>

    </div>


    <!-- 總結 -->
    <div class="card">

        <div class="summary">

            <div class="stat">

                <small>
                    總工作時間
                </small>

                <strong id="totalTime">
                    0小時 0分 0秒
                </strong>

            </div>


            <div class="stat">

                <small>
                    預估總收入
                </small>

                <strong id="totalPay">
                    NT$ 0.00
                </strong>

            </div>

        </div>

    </div>


    <!-- 工作紀錄 -->
    <div class="card">

        <label>
            工作紀錄
        </label>

        <div id="records"></div>


        <button
            class="secondary"
            style="width:100%;margin-top:10px"
            onclick="clearAll()"
        >
            清除全部紀錄
        </button>

    </div>

</div>


<script>

// 儲存紀錄的 Key
const STORAGE_KEY =
    "uber_salary_records_v1";


// 從手機瀏覽器讀取紀錄
let records =
    JSON.parse(
        localStorage.getItem(STORAGE_KEY) || "[]"
    );


// 計時器
let timerStart = null;
let timerInterval = null;


// 取得今天日期
function today() {

    const d = new Date();

    const tz =
        d.getTimezoneOffset();

    return new Date(
        d.getTime() - tz * 60000
    )
    .toISOString()
    .slice(0, 10);

}


// 預設日期
document.getElementById("date").value =
    today();


// 取得目前時薪
function getRate() {

    return Math.max(
        0,
        Number(
            document.getElementById("rate").value
        ) || 0
    );

}


// 金額格式
function money(number) {

    return "NT$ " +
        number.toLocaleString(
            "zh-TW",
            {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }
        );

}


// 秒數轉成
// X小時 X分 X秒
function formatTime(seconds) {

    seconds =
        Math.max(
            0,
            Math.round(seconds)
        );

    const hours =
        Math.floor(seconds / 3600);

    const minutes =
        Math.floor(
            (seconds % 3600) / 60
        );

    const secs =
        seconds % 60;

    return (
        hours +
        "小時 " +
        minutes +
        "分 " +
        secs +
        "秒"
    );

}


// 秒數轉成
// 00:00:00
function clock(seconds) {

    seconds =
        Math.max(
            0,
            Math.floor(seconds)
        );

    const hours =
        String(
            Math.floor(seconds / 3600)
        ).padStart(2, "0");

    const minutes =
        String(
            Math.floor(
                (seconds % 3600) / 60
            )
        ).padStart(2, "0");

    const secs =
        String(
            seconds % 60
        ).padStart(2, "0");

    return (
        hours +
        ":" +
        minutes +
        ":" +
        secs
    );

}


// 新增一筆紀錄
function addRecord(
    seconds,
    date
) {

    if (seconds <= 0) {
        return;
    }

    records.unshift({

        id:
            Date.now() +
            Math.random(),

        seconds:
            Math.round(seconds),

        date:
            date || today()

    });

    save();

    render();

}


// 手動新增時間
function addManual() {

    const hours =
        Math.max(
            0,
            Number(
                document.getElementById(
                    "hours"
                ).value
            ) || 0
        );


    const minutes =
        Math.max(
            0,
            Number(
                document.getElementById(
                    "minutes"
                ).value
            ) || 0
        );


    const seconds =
        Math.max(
            0,
            Number(
                document.getElementById(
                    "seconds"
                ).value
            ) || 0
        );


    const totalSeconds =
        hours * 3600 +
        minutes * 60 +
        seconds;


    const date =
        document.getElementById(
            "date"
        ).value || today();


    addRecord(
        totalSeconds,
        date
    );


    // 清空輸入框
    document.getElementById(
        "hours"
    ).value = 0;

    document.getElementById(
        "minutes"
    ).value = 0;

    document.getElementById(
        "seconds"
    ).value = 0;

}


// 開始計時
function startTimer() {

    if (timerStart) {
        return;
    }


    timerStart =
        Date.now();


    document.getElementById(
        "startBtn"
    ).disabled = true;


    document.getElementById(
        "stopBtn"
    ).disabled = false;


    updateTimer();


    timerInterval =
        setInterval(
            updateTimer,
            250
        );

}


// 更新計時器畫面
function updateTimer() {

    if (!timerStart) {
        return;
    }


    const seconds =
        (
            Date.now() -
            timerStart
        ) / 1000;


    document.getElementById(
        "timerDisplay"
    ).textContent =
        clock(seconds);

}


// 停止計時
function stopTimer() {

    if (!timerStart) {
        return;
    }


    const seconds =
        Math.floor(
            (
                Date.now() -
                timerStart
            ) / 1000
        );


    clearInterval(
        timerInterval
    );


    timerInterval =
        null;


    timerStart =
        null;


    document.getElementById(
        "timerDisplay"
    ).textContent =
        "00:00:00";


    document.getElementById(
        "startBtn"
    ).disabled = false;


    document.getElementById(
        "stopBtn"
    ).disabled = true;


    addRecord(
        seconds,
        today()
    );

}


// 儲存資料
function save() {

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(records)
    );

}


// 刪除單筆紀錄
function removeRecord(id) {

    records =
        records.filter(
            record =>
                record.id !== id
        );


    save();

    render();

}


// 清除全部
function clearAll() {

    if (
        records.length &&
        confirm(
            "確定要清除全部工作紀錄嗎？"
        )
    ) {

        records = [];

        save();

        render();

    }

}


// 更新畫面
function render() {

    const rate =
        getRate();


    // 計算總工作秒數
    const total =
        records.reduce(
            (sum, record) =>
                sum + record.seconds,
            0
        );


    // 顯示總時間
    document.getElementById(
        "totalTime"
    ).textContent =
        formatTime(total);


    // 計算總收入
    const totalPay =
        total / 3600 * rate;


    document.getElementById(
        "totalPay"
    ).textContent =
        money(totalPay);


    const box =
        document.getElementById(
            "records"
        );


    // 沒有紀錄
    if (!records.length) {

        box.innerHTML =
            '<div class="empty">' +
            '目前還沒有工作紀錄' +
            '</div>';

        return;

    }


    // 顯示紀錄
    box.innerHTML =
        records.map(
            record => {

                const pay =
                    record.seconds /
                    3600 *
                    rate;


                return `

                <div class="record">

                    <div class="record-main">

                        <div class="record-title">

                            ${record.date}

                        </div>


                        <div class="record-meta">

                            ${formatTime(
                                record.seconds
                            )}

                            ·

                            ${money(pay)}

                        </div>

                    </div>


                    <div class="record-pay">

                        ${money(pay)}

                    </div>


                    <button
                        class="danger"
                        onclick="removeRecord(${record.id})"
                    >

                        刪除

                    </button>

                </div>

                `;

            }
        )
        .join("");

}


// 修改時薪時即時重新計算
document.getElementById(
    "rate"
)
.addEventListener(
    "input",
    render
);


// 初始載入
render();

</script>

</body>
</html>
